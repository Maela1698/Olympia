<div class="login-wrapper">
  
  <div class="login-card" *ngIf="!currentRole" style="text-align: center; max-width: 500px;">
    
    <div class="login-header">
      <h2 style="font-size: 1.8rem; margin-bottom: 10px;">Portail de Connexion</h2>
      <p style="color: #64748b; font-size: 0.95rem;">Choisisser le rôle </p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 30px;">
      
      <a [routerLink]="['/login']" [queryParams]="{role: 'client'}" target="_blank" 
         style="background: #f8fafc; border: 2px solid #e2e8f0; color: #0f172a; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;">
        <span>1. Ouvrir l'onglet Client</span>
        <i class="fa-solid fa-up-right-from-square" style="opacity: 0.5;"></i>
      </a>

      <a [routerLink]="['/login']" [queryParams]="{role: 'commercial'}" target="_blank" 
         style="background: #ecfdf5; border: 2px solid #34d399; color: #065f46; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;">
        <span>2. Ouvrir l'onglet Vendeur</span>
        <i class="fa-solid fa-up-right-from-square" style="opacity: 0.5;"></i>
      </a>

      <a [routerLink]="['/login']" [queryParams]="{role: 'admin'}" target="_blank" 
         style="background: #0f172a; border: 2px solid #0f172a; color: white; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: 700; display: flex; justify-content: space-between; align-items: center; transition: 0.2s;">
        <span>3. Ouvrir l'onglet Administrateur</span>
        <i class="fa-solid fa-up-right-from-square" style="opacity: 0.5;"></i>
      </a>
      
    </div>
  </div>

  <div class="login-card" *ngIf="currentRole">
    
    <div class="login-header">
        <h2>Connexion <span style="text-transform: capitalize; color: #4f46e5;">{{ currentRole }}</span><span class="accent">.</span></h2>
    </div>
    
    <div *ngIf="errorMessage" class="alert-error">
      <span class="icon">⚠️</span> {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      
      <div class="form-group">
        <label for="mail">Adresse e-mail</label>
        <div class="input-wrapper">
          <input type="email" id="mail" formControlName="mail" [class.invalid]="loginForm.get('mail')?.invalid && loginForm.get('mail')?.touched">
        </div>
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Mot de passe</label>
        </div>
        <div class="input-wrapper">
          <input type="password" id="password" formControlName="password" [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loginForm.invalid || isLoading">
        <span *ngIf="isLoading" class="loader"></span>
        <span *ngIf="!isLoading">Se connecter</span>
      </button>

    </form>
    
  </div>

</div>
