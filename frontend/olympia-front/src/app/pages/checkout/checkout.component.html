<div class="page-container" style="max-width: 600px; margin: 3rem auto; padding: 2rem; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
  
  <div style="text-align: center; margin-bottom: 2rem;">
    <h1 style="font-size: 1.8rem; color: #0f172a; margin-bottom: 0.5rem;">Paiement Sécurisé</h1>
    <p style="color: #64748b;">Montant à régler : <strong style="color: #4f46e5; font-size: 1.2rem;">{{ totalMontant | number }} Ar</strong></p>
  </div>

  <div style="background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 12px; padding: 1.5rem; color: white; margin-bottom: 2rem; position: relative; overflow: hidden;">
    <div style="position: absolute; top: -20px; right: -20px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
    <div style="font-size: 1.5rem; letter-spacing: 4px; margin-bottom: 1.5rem; margin-top: 1rem; font-family: monospace;">
      **** **** **** 4242
    </div>
    <div style="display: flex; justify-content: space-between; font-size: 0.85rem; text-transform: uppercase; color: #94a3b8;">
      <span>Titulaire</span>
      <span>Expire fin</span>
    </div>
    <div style="display: flex; justify-content: space-between; font-size: 1rem;">
      <span>CLIENT OLYMPIA</span>
      <span>12/28</span>
    </div>
  </div>

  <div style="display: grid; gap: 1rem; margin-bottom: 2rem;">
    <div>
      <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 5px;">Nom sur la carte</label>
      <input type="text" value="Client Olympia" disabled style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; color: #64748b;">
    </div>
    <div>
      <label style="display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 5px;">Numéro de carte</label>
      <input type="text" value="**** **** **** 4242" disabled style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; background: #f8fafc; color: #64748b;">
    </div>
  </div>

  <div style="border-top: 1px solid #e2e8f0; padding-top: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
    <a routerLink="/panier" style="color: #64748b; text-decoration: none; font-weight: 600;">← Retour au panier</a>
    
    <button (click)="validerPaiement()" [disabled]="isLoading" style="background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2); transition: 0.2s; display: flex; align-items: center; gap: 8px;">
      <span *ngIf="isLoading"><i class="fa-solid fa-spinner fa-spin"></i> Traitement...</span>
      <span *ngIf="!isLoading"><i class="fa-solid fa-lock"></i> Valider et Payer</span>
    </button>
  </div>

</div>
